<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Galería 3D — Juan Pablo Castro Casillas. Explora los trabajos en un espacio tridimensional.">
  <title>Galería 3D — JPCC</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,700;0,14..32,900;1,14..32,300;1,14..32,400&display=swap" rel="stylesheet">

  <style>
    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       RESET & BASE
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #EDECEA;
      --bg-dark:   #080808;
      --ink:       #080808;
      --fg:        #EDECEA;
      --fg-muted:  rgba(237,236,234,0.4);
      --fg-ghost:  rgba(237,236,234,0.08);
      --border:    rgba(237,236,234,0.07);
      --font:      'Inter','Helvetica Neue',Arial,sans-serif;
      --ease:      cubic-bezier(0.16,1,0.3,1);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg-dark);
      color: var(--fg);
      font-family: var(--font);
      cursor: none;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       CANVAS
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    #three-canvas {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      display: block;
      transition: opacity 0.6s cubic-bezier(0.16,1,0.3,1);
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       CUSTOM CURSOR
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    #cur-dot {
      position: fixed; width: 7px; height: 7px;
      background: var(--fg); border-radius: 50%;
      pointer-events: none; z-index: 10000;
      transform: translate(-50%,-50%);
      transition: width .25s var(--ease), height .25s var(--ease), background .2s;
      will-change: left,top;
    }
    #cur-ring {
      position: fixed; width: 38px; height: 38px;
      border: 1.5px solid rgba(237,236,234,.3);
      border-radius: 50%; pointer-events: none; z-index: 10000;
      transform: translate(-50%,-50%);
      transition: width .35s var(--ease), height .35s var(--ease), border-color .25s;
      will-change: left,top;
    }
    body.cur-active #cur-dot  { width: 12px; height: 12px; }
    body.cur-active #cur-ring { width: 64px; height: 64px; border-color: rgba(237,236,234,.15); }
    body.cur-drag   #cur-ring { width: 50px; height: 50px; }

    @media (hover: none) and (pointer: coarse) {
      #cur-dot, #cur-ring { display: none !important; }
      body { cursor: auto !important; }
      .dp-close { cursor: pointer !important; }
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       LOADING SCREEN
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    #loading {
      position: fixed; inset: 0; z-index: 2000;
      background: var(--bg-dark);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 28px;
      transition: opacity .8s var(--ease);
    }
    #loading.fade { opacity: 0; pointer-events: none; }
    .ld-logo {
      font-size: 11px; font-weight: 700;
      letter-spacing: .3em; text-transform: uppercase;
      color: var(--fg-muted);
    }
    .ld-bar-wrap {
      width: 160px; height: 1px;
      background: rgba(237,236,234,.08);
      overflow: hidden;
    }
    .ld-bar {
      height: 100%; background: rgba(237,236,234,.5);
      width: 0%; transition: width .3s linear;
    }
    .ld-label {
      font-size: 9.5px; letter-spacing: .22em;
      text-transform: uppercase; color: var(--fg-muted);
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       NAV
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .gal-nav {
      position: fixed;
      top: 24px;
      left: 52px;
      right: 52px;
      z-index: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 32px;
      background: rgba(8, 8, 8, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-bottom-color: rgba(0, 0, 0, 0.40);
      border-radius: 40px;
      backdrop-filter: blur(40px) saturate(220%) brightness(1.06);
      -webkit-backdrop-filter: blur(40px) saturate(220%) brightness(1.06);
      box-shadow:
        inset 0 1.5px 0 rgba(255, 255, 255, 0.30),
        inset 0 -1px 0 rgba(0, 0, 0, 0.45),
        inset 1px 0 0 rgba(255, 255, 255, 0.10),
        inset -1px 0 0 rgba(255, 255, 255, 0.08),
        0 16px 56px rgba(0, 0, 0, 0.50),
        0 4px 12px rgba(0, 0, 0, 0.30);
      transition: all 0.4s var(--ease);
      overflow: hidden;
    }
    .gal-nav::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(
        135deg,
        rgba(255,255,255,0.22) 0%,
        rgba(255,255,255,0.04) 40%,
        rgba(255,255,255,0.00) 65%,
        rgba(255,255,255,0.04) 100%
      );
      border-radius: 40px;
      pointer-events: none;
    }
    .gal-nav a {
      font-size: 10.5px; font-weight: 500;
      letter-spacing: .22em; text-transform: uppercase;
      text-decoration: none; color: rgba(237, 236, 234, 0.75);
      position: relative; padding-bottom: 2px;
      transition: color 0.3s;
    }
    .gal-nav a:hover { color: rgba(237, 236, 234, 1); }
    .gal-nav a::after {
      content: ''; position: absolute; bottom: 0; left: 0;
      width: 100%; height: 1px; background: rgba(237, 236, 234, 0.95);
      transform: scaleX(0); transform-origin: right;
      transition: transform .35s var(--ease);
    }
    .gal-nav a:hover::after { transform: scaleX(1); transform-origin: left; }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       SIDE DOT INDEX
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    #gal-index {
      position: fixed; right: 52px; top: 50%; transform: translateY(-50%);
      z-index: 600; display: flex; flex-direction: column; gap: 12px; align-items: flex-end;
    }
    .gi-dot {
      width: 6px; height: 6px; border-radius: 50%;
      border: 1.5px solid rgba(237,236,234,.22);
      background: transparent; cursor: none;
      transition: all .4s var(--ease);
    }
    .gi-dot.active {
      background: var(--fg); border-color: var(--fg);
      width: 8px; height: 8px;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       PIECE COUNTER (bottom-left)
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */


    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       HINTS
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    #drag-hint {
      position: fixed; right: 52px; bottom: 52px; z-index: 600;
      text-align: right; pointer-events: none;
      transition: opacity 1s var(--ease);
    }
    #drag-hint.gone { opacity: 0; }
    .dh-text {
      font-size: 9.5px; letter-spacing: .2em; text-transform: uppercase;
      color: rgba(237,236,234,.22); display: block; margin-bottom: 8px;
    }
    .dh-arrows {
      font-size: 18px; color: rgba(237,236,234,.18);
      animation: sway 2.2s ease-in-out infinite;
    }
    @keyframes sway {
      0%,100% { transform: translateX(0); }
      50%      { transform: translateX(-6px); }
    }

    #click-hint {
      position: fixed; left: 50%; bottom: 42px; transform: translateX(-50%);
      z-index: 600; pointer-events: none;
      font-size: 9.5px; letter-spacing: .22em; text-transform: uppercase;
      color: rgba(237,236,234,.32);
      opacity: 0; transition: opacity .6s var(--ease);
    }
    #click-hint.show { opacity: 1; }

    /* Keyboard nav hint (top-center) */
    #key-hint {
      position: fixed; top: 26px; left: 50%; transform: translateX(-50%);
      z-index: 600; pointer-events: none;
      font-size: 9px; letter-spacing: .2em; text-transform: uppercase;
      color: rgba(237,236,234,.18);
      opacity: 0; transition: opacity .5s;
    }
    #key-hint.show { opacity: 1; }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       DETAIL PANEL
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    #detail-panel {
      position: fixed; right: 0; top: 0; bottom: 0;
      width: min(420px, 88vw);
      background: rgba(8, 8, 8, 0.20);
      border-left: 1px solid rgba(255, 255, 255, 0.22);
      z-index: 700;
      padding: 96px 48px 52px;
      display: flex; flex-direction: column;
      transform: translateX(105%);
      transition: transform .75s var(--ease);
      backdrop-filter: blur(48px) saturate(220%) brightness(1.05);
      -webkit-backdrop-filter: blur(48px) saturate(220%) brightness(1.05);
      box-shadow:
        inset 1.5px 0 0 rgba(255, 255, 255, 0.25),
        inset 0 1px 0 rgba(255, 255, 255, 0.15),
        -16px 0 64px rgba(0, 0, 0, 0.55);
      overflow-y: auto;
      overflow: hidden;
    }
    #detail-panel::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(
        135deg,
        rgba(255,255,255,0.12) 0%,
        rgba(255,255,255,0.02) 40%,
        transparent 70%
      );
      pointer-events: none;
    }
    #detail-panel.open { transform: translateX(0); }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       LARGE IMAGE VIEW
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    #large-view {
      position: fixed; left: 0; top: 0; bottom: 0;
      right: min(420px, 88vw);
      z-index: 650;
      display: flex; align-items: center; justify-content: center;
      padding: 40px;
      opacity: 0; pointer-events: none;
      transition: opacity .75s var(--ease);
      background: rgba(8, 8, 8, 0.45);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
    }
    #large-view.open { opacity: 1; pointer-events: auto; }
    #large-view img {
      max-width: 100%; max-height: 100%;
      border-radius: 2px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       FILTERS
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .gal-filters {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 600;
      pointer-events: auto;
      overflow-x: auto;
      max-width: 90vw;
      padding-bottom: 8px;
      padding-left: 16px;
      padding-right: 16px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .gal-filters::-webkit-scrollbar { display: none; }

    .filter-pill {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.26);
      border-bottom-color: rgba(0,0,0,0.22);
      color: rgba(237,236,234,0.80);
      padding: 10px 20px;
      border-radius: 40px;
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      backdrop-filter: blur(32px) saturate(200%) brightness(1.06);
      -webkit-backdrop-filter: blur(32px) saturate(200%) brightness(1.06);
      box-shadow:
        inset 0 1.5px 0 rgba(255,255,255,0.38),
        inset 0 -1px 0 rgba(0,0,0,0.22),
        0 6px 24px rgba(0,0,0,0.32),
        0 1px 4px rgba(0,0,0,0.18);
      transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
      position: relative;
      overflow: hidden;
    }
    .filter-pill::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(
        135deg,
        rgba(255,255,255,0.28) 0%,
        rgba(255,255,255,0.04) 45%,
        transparent 70%
      );
      border-radius: 40px;
      pointer-events: none;
    }
    .filter-pill:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.42);
      color: rgba(237,236,234,0.98);
      box-shadow:
        inset 0 1.5px 0 rgba(255,255,255,0.55),
        inset 0 -1px 0 rgba(0,0,0,0.12),
        0 10px 40px rgba(0,0,0,0.40),
        0 2px 8px rgba(0,0,0,0.22);
      transform: translateY(-1px);
    }
    .filter-pill.active {
      background: rgba(237,236,234,0.12);
      border-color: rgba(255,255,255,0.55);
      color: rgba(237,236,234,1);
      box-shadow:
        inset 0 1.5px 0 rgba(255,255,255,0.65),
        inset 0 -1px 0 rgba(0,0,0,0.08),
        0 10px 36px rgba(0,0,0,0.40),
        0 0 0 1px rgba(255,255,255,0.10);
    }
    
    @media (max-width: 768px) {
      .gal-filters { bottom: 20px; justify-content: flex-start; }
      .gal-nav {
        top: 16px;
        left: 16px;
        right: 16px;
        padding: 12px 20px;
      }
      #gal-index { display: none; }
      #drag-hint { right: 24px; bottom: 30px; }
      #key-hint { display: none; }
      
      #detail-panel { 
        width: 100%; top: auto; bottom: 0; height: 75vh; 
        padding: 32px 20px 24px; 
        transform: translateY(105%) translateX(0);
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }
      #detail-panel.open { transform: translateY(0) translateX(0); }
      
      #large-view { right: 0; bottom: 75vh; padding: 20px; z-index: 650; }
    }

    .dp-close {
      position: absolute; top: 22px; right: 22px;
      width: 42px; height: 42px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.28);
      border-bottom-color: rgba(0,0,0,0.30);
      color: var(--fg); font-size: 14px; cursor: none;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(32px) saturate(200%) brightness(1.08);
      -webkit-backdrop-filter: blur(32px) saturate(200%) brightness(1.08);
      box-shadow:
        inset 0 1.5px 0 rgba(255,255,255,0.42),
        inset 0 -1px 0 rgba(0,0,0,0.28),
        0 6px 24px rgba(0,0,0,0.38);
      transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
      overflow: hidden;
    }
    .dp-close::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(
        ellipse at 35% 30%,
        rgba(255,255,255,0.35) 0%,
        rgba(255,255,255,0.05) 55%,
        transparent 80%
      );
      border-radius: 50%;
      pointer-events: none;
    }
    .dp-close:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.48);
      box-shadow:
        inset 0 1.5px 0 rgba(255,255,255,0.60),
        inset 0 -1px 0 rgba(0,0,0,0.15),
        0 10px 36px rgba(0,0,0,0.48);
      transform: scale(1.08);
    }

    .dp-ghost-num {
      font-size: clamp(80px,11vw,110px);
      font-weight: 900; letter-spacing: -.06em; line-height: .8;
      color: rgba(237,236,234,.04);
      position: absolute; top: 82px; right: 48px;
      pointer-events: none; user-select: none;
    }

    @media (max-width: 768px) {
      .dp-ghost-num {
        font-size: clamp(60px, 8vw, 90px);
        top: 72px;
        right: 16px;
      }
    }

    .dp-label {
      font-size: 10px; font-weight: 500;
      letter-spacing: .22em; text-transform: uppercase;
      color: rgba(237,236,234,.3);
      margin-bottom: 36px;
      display: flex; align-items: center; gap: 14px;
    }

    @media (max-width: 768px) {
      .dp-label {
        margin-bottom: 16px;
        font-size: 9px;
        gap: 10px;
      }
    }
    .dp-label::before {
      content: ''; width: 24px; height: 1px;
      background: currentColor; flex-shrink: 0;
    }

    .dp-name {
      font-size: clamp(28px, 3.5vw, 48px);
      font-weight: 900; letter-spacing: -.04em;
      line-height: .9; text-transform: uppercase;
      margin-bottom: 28px;
    }

    @media (max-width: 768px) {
      .dp-name {
        font-size: clamp(22px, 5vw, 36px);
        margin-bottom: 16px;
      }
    }

    .dp-desc {
      font-size: 13.5px; font-weight: 300;
      line-height: 1.95; color: rgba(237,236,234,.5);
      margin-bottom: 48px; flex: 1;
    }

    @media (max-width: 768px) {
      .dp-desc {
        font-size: 12px;
        line-height: 1.6;
        margin-bottom: 24px;
      }
    }

    .dp-meta { border-top: 1px solid var(--border); }
    .dp-meta-row {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 14px 0; border-bottom: 1px solid rgba(237,236,234,.04);
    }
    .dp-key {
      font-size: 9.5px; font-weight: 500;
      letter-spacing: .2em; text-transform: uppercase;
      color: rgba(237,236,234,.28);
    }
    .dp-val { font-size: 12.5px; color: rgba(237,236,234,.6); }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       RESPONSIVE
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

  <script>
  /* ════════════════════════════════════════════════

  const PIECES = [

  let PIECES_ACTIVE = [...PIECES];
  const FULL_PIECES = [...PIECES];
  let N      = PIECES_ACTIVE.length;
  const RADIUS = 7.6;
  let STEP   = (Math.PI * 2) / N;

  /* ════════════════════════════════════════════════

  ════════════════════════════════════════════════ */
  const canvas = document.getElementById('three-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  /* ════════════════════════════════════════════════

  scene.background = new THREE.Color(0x080808);
  scene.fog = new THREE.FogExp2(0x080808, 0.058);

  /* ════════════════════════════════════════════════
     CAMERA — sits at center of the cylinder
  ════════════════════════════════════════════════ */
  const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 40);
  camera.position.set(0, 0.25, 0);

  /* ════════════════════════════════════════════════
     LIGHTS
  ════════════════════════════════════════════════ */
  scene.add(new THREE.AmbientLight(0xfff5e8, 0.18));

  const topLight = new THREE.PointLight(0xedecea, 1.1, 20);
  topLight.position.set(0, 5, 0);
  scene.add(topLight);

  // Warm & cool accent lights for atmosphere
  const warmLight = new THREE.PointLight(0xffe4b5, 0.55, 12);
  warmLight.position.set(RADIUS * .55, .8, -RADIUS * .55);
  scene.add(warmLight);

  const coolLight = new THREE.PointLight(0xc8d8ff, 0.35, 10);
  coolLight.position.set(-RADIUS * .55, .8, RADIUS * .55);
  scene.add(coolLight);

  /* ════════════════════════════════════════════════
     FLASHLIGHT (LINTERNA)
  ════════════════════════════════════════════════ */
  const flashLight = new THREE.SpotLight(0xffffff, 0); // starts off
  flashLight.angle = Math.PI / 8;
  flashLight.penumbra = 0.6;
  flashLight.decay = 1.5;
  flashLight.distance = 25;
  camera.add(flashLight);
  scene.add(camera);

  const flashTarget = new THREE.Object3D();
  camera.add(flashTarget);
  flashTarget.position.set(0, 0, -5);
  flashLight.target = flashTarget;

  /* ════════════════════════════════════════════════
     GALLERY GROUP — rotates around Y
  ════════════════════════════════════════════════ */
  const gallery = new THREE.Group();
  scene.add(gallery);

  /* ════════════════════════════════════════════════
     ENVIRONMENT — floor, ceiling, walls
  ════════════════════════════════════════════════ */
  // Floor
  {
    const geo = new THREE.CircleGeometry(RADIUS + 2, 96);
    const mat = new THREE.MeshStandardMaterial({ color: 0x0b0b0b, roughness: 1, metalness: 0 });
    const m   = new THREE.Mesh(geo, mat);
    m.rotation.x = -Math.PI / 2;
    m.position.y = -1.55;
    scene.add(m);

    // Floor ring glow
    const ringGeo = new THREE.TorusGeometry(RADIUS, 0.014, 8, 96);
    const ringMat = new THREE.MeshBasicMaterial({ color: 0x1e1e1e });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI / 2;
    ring.position.y = -1.54;
    scene.add(ring);

    // Inner floor ring (subtle)
    const inner = new THREE.TorusGeometry(RADIUS * .35, 0.008, 8, 60);
    const innerMat = new THREE.MeshBasicMaterial({ color: 0x141414 });
    const innerM = new THREE.Mesh(inner, innerMat);
    innerM.rotation.x = Math.PI / 2;
    innerM.position.y = -1.54;
    scene.add(innerM);
  }

  // Ceiling
  {
    const geo = new THREE.CircleGeometry(RADIUS + 2, 96);
    const mat = new THREE.MeshStandardMaterial({ color: 0x090909, roughness: 1 });
    const m   = new THREE.Mesh(geo, mat);
    m.rotation.x = Math.PI / 2;
    m.position.y = 2.9;
    scene.add(m);
  }

  // Cylinder wall (dark, backside visible from inside)
  {
    const geo = new THREE.CylinderGeometry(RADIUS + .4, RADIUS + .4, 4.8, 96, 1, true);
    const mat = new THREE.MeshStandardMaterial({ color: 0x0c0c0c, side: THREE.BackSide, roughness: 1 });
    scene.add(new THREE.Mesh(geo, mat));
  }

  /* ════════════════════════════════════════════════
     ATMOSPHERIC PARTICLES
  ════════════════════════════════════════════════ */
  {
    const count  = 150;
    const pos    = new Float32Array(count * 3);
    const speeds = new Float32Array(count);
    for (let i = 0; i < count; i++) {
      const theta = Math.random() * Math.PI * 2;
      const r     = Math.random() * RADIUS * .85;
      pos[i*3]   = Math.cos(theta) * r;
      pos[i*3+1] = (Math.random() - .5) * 4;
      pos[i*3+2] = Math.sin(theta) * r;
      speeds[i]  = .0004 + Math.random() * .0008;
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const mat = new THREE.PointsMaterial({ color: 0x443322, size: .022, transparent: true, opacity: .55 });
    const pts = new THREE.Points(geo, mat);
    scene.add(pts);

    // Animate particles in render loop via closure
    window._particles = { pts, pos, speeds, count };
  }

  /* ════════════════════════════════════════════════
     LOAD FRAMES
  ════════════════════════════════════════════════ */
  const loader   = new THREE.TextureLoader();
  let frames     = [];
  const allFrames = [];
  let   loaded   = 0;
  const ldBar    = document.getElementById('ld-bar');
  const ldLabel  = document.getElementById('ld-label');

  PIECES.forEach((p, i) => {
    const angle = -i * STEP;
    const x     = Math.sin(angle) * RADIUS;
    const z     = -Math.cos(angle) * RADIUS;  // piece 0 directly in front (-Z)

    loader.load(
      p.img,
      texture => {
        texture.colorSpace = THREE.SRGBColorSpace;
        texture.anisotropy  = renderer.capabilities.getMaxAnisotropy();

        const aspect = texture.image.naturalWidth / texture.image.naturalHeight;
        const ph = 2.8;
        const pw = Math.min(ph * aspect, 2.2 * ph); // cap wide images

        buildFrame(i, x, z, pw, ph, texture, p);
        onFrameLoaded();
      },
      undefined,
      () => {
        // Error — placeholder dark frame
        const geo = new THREE.PlaneGeometry(1.8, 2.5);
        const mat = new THREE.MeshBasicMaterial({ color: 0x141414, fog: false });
        const grp = new THREE.Group();
        grp.add(new THREE.Mesh(geo, mat));
        grp.position.set(x, 0, z);
        grp.userData = { index: i, data: p, imgMat: mat, activeIndex: i };
        gallery.add(grp);
        allFrames.push(grp);
        frames.push(grp);
        onFrameLoaded();
      }
    );
  });

  function buildFrame(i, x, z, pw, ph, texture, p) {
    const grp = new THREE.Group();

    // Soft shadow plane behind
    const shadowGeo = new THREE.PlaneGeometry(pw + .8, ph + .8);
    const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: .45 });
    const shadow    = new THREE.Mesh(shadowGeo, shadowMat);
    shadow.position.z = -.04;

    // Frame border
    const fGeo = new THREE.PlaneGeometry(pw + .07, ph + .07);
    const fMat = new THREE.MeshBasicMaterial({ color: 0x1c1c1c });
    const frame = new THREE.Mesh(fGeo, fMat);

    // Image
    const iGeo = new THREE.PlaneGeometry(pw, ph);
    const iMat = new THREE.MeshStandardMaterial({
      map: texture,
      roughness: 0.8,
      metalness: 0.1,
      transparent: true,
      opacity: 0.3,
    });
    const img  = new THREE.Mesh(iGeo, iMat);
    img.position.z = .003;

    // Top accent strip
    const sGeo = new THREE.PlaneGeometry(pw + .07, .007);
    const sMat = new THREE.MeshBasicMaterial({ color: 0x2a2a2a, transparent: true, opacity: .9 });
    const strip = new THREE.Mesh(sGeo, sMat);
    strip.position.set(0, (ph + .07) / 2 + .0035, .004);

    // Wall mount pin (tiny sphere)
    const pinGeo = new THREE.SphereGeometry(.025, 8, 8);
    const pinMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: .4, metalness: .6 });
    const pin    = new THREE.Mesh(pinGeo, pinMat);
    pin.position.set(0, ph / 2 + .25, -.05);

    // Wire from pin to frame top
    const wirePts = [
      new THREE.Vector3(0, ph / 2 + .25, -.05),
      new THREE.Vector3(0, ph / 2 + .03, .0)
    ];
    const wireGeo = new THREE.BufferGeometry().setFromPoints(wirePts);
    const wireMat = new THREE.LineBasicMaterial({ color: 0x1a1a1a });
    const wire    = new THREE.Line(wireGeo, wireMat);

    grp.add(shadow, frame, img, strip, pin, wire);
    grp.position.set(x, 0, z);
    grp.userData = { index: i, data: p, imgMat: iMat, activeIndex: i };
        gallery.add(grp);
        allFrames.push(grp);
        frames.push(grp);
  }

  function onFrameLoaded() {
    loaded++;
    ldBar.style.width = (loaded / N * 100) + '%';
    ldLabel.textContent = `${loaded} / ${N} obras`;
    if (loaded === N) onAllLoaded();
  }

  /* ════════════════════════════════════════════════
     ALL LOADED
  ════════════════════════════════════════════════ */
  function setFilter(filterVal) {
    frames = allFrames.filter(f => {
      if (filterVal === 'all') return true;
      const d = f.userData.data;
      if (filterVal === '2024' || filterVal === '2025') return d.year === filterVal;
      return (d.cat && d.cat.includes(filterVal)) || (d.disc && d.disc.includes(filterVal));
    });

    PIECES_ACTIVE = frames.map(f => f.userData.data);

    allFrames.forEach(f => gallery.remove(f));

    N = frames.length;
    if (N === 0) return;
    STEP = (Math.PI * 2) / N;

    frames.forEach((f, i) => {
      const angle = -i * STEP;
      const x = Math.sin(angle) * RADIUS;
      const z = -Math.cos(angle) * RADIUS;
      f.position.set(x, 0, z);
      f.userData.activeIndex = i;
      gallery.add(f);
    });
    
    const indexEl = document.getElementById('gal-index');
    indexEl.innerHTML = '';
    frames.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'gi-dot';
      d.addEventListener('click', () => navigateTo(i));
      indexEl.appendChild(d);
    });

    currentRot = 0;
    targetRot = 0;
    activeIdx = 0;
    prevActive = -1;
    gallery.rotation.y = 0;
    
    updateActive(0);
  }

  document.querySelectorAll('.filter-pill').forEach(btn => {
    btn.addEventListener('click', (e) => {
      document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      setFilter(e.target.dataset.filter);
    });
  });

  function onAllLoaded() {
    // Short delay then fade loading
    setTimeout(() => {
      document.getElementById('loading').classList.add('fade');
      setTimeout(() => document.getElementById('loading').style.display = 'none', 900);
    }, 500);

    // Build side dots
    const indexEl = document.getElementById('gal-index');
    PIECES_ACTIVE.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'gi-dot';
      d.addEventListener('click', () => navigateTo(i));
      indexEl.appendChild(d);
    });

    // Show key hint briefly
    const keyHint = document.getElementById('key-hint');
    setTimeout(() => {
      keyHint.classList.add('show');
      setTimeout(() => keyHint.classList.remove('show'), 3500);
    }, 1400);

    updateActive(0);
  }

  /* ════════════════════════════════════════════════
     ROTATION STATE
  ════════════════════════════════════════════════ */
  let targetRot  = 0;   // target gallery.rotation.y
  let currentRot = 0;   // smoothed current
  let activeIdx  = 0;
  let prevActive = -1;
  let hoveredIdx = -1; // Added to track which piece is currently hovered

  function getIdxFromRot(rot) {
    // When gallery.rotation.y = rot, which piece is at front-center?
    let a = (rot / STEP);
    return ((Math.round(a) % N) + N) % N;
  }

  function navigateTo(idx) {
    if (frames.length === 0) return;
    const target     = idx * STEP;
    const raw        = target - currentRot;
    const normalized = ((raw % (Math.PI * 2)) + Math.PI * 3) % (Math.PI * 2) - Math.PI;
    targetRot = currentRot + normalized;
  }

  function updateActive(idx) {
    if (frames.length === 0) return;
    activeIdx = idx;
    const p   = PIECES_ACTIVE[idx];

    document.querySelectorAll('.gi-dot').forEach((d, i) => {
      d.classList.toggle('active', i === idx);
    });

    // Brightness
    frames.forEach(f => {
      const mat = f.userData.imgMat;
      if (mat) mat.opacity = 1.0;
    });

    // Show click hint briefly
    const ch = document.getElementById('click-hint');
    ch.classList.add('show');
    setTimeout(() => ch.classList.remove('show'), 2200);
  }

  /* ════════════════════════════════════════════════
     DRAG / TOUCH INTERACTION
  ════════════════════════════════════════════════ */
  let dragging   = false;
  let startX     = 0;
  let startRot   = 0;
  let totalDelta = 0;

  canvas.addEventListener('pointerdown', e => {
    dragging   = true;
    startX     = e.clientX;
    startRot   = targetRot;
    totalDelta = 0;
    canvas.setPointerCapture(e.pointerId);
    document.body.classList.add('cur-drag');
  });

  window.addEventListener('pointermove', e => {
    if (!dragging) return;
    const dx   = e.clientX - startX;
    totalDelta = Math.abs(dx);
    targetRot  = startRot + dx * .0072;
  });

  window.addEventListener('pointerup', e => {
    if (!dragging) return;
    dragging = false;
    document.body.classList.remove('cur-drag');

    if (totalDelta < 6) {
      const clickNorm = new THREE.Vector2(
        (e.clientX / window.innerWidth) * 2 - 1,
        -(e.clientY / window.innerHeight) * 2 + 1
      );
      raycaster.setFromCamera(clickNorm, camera);
      const intersects = raycaster.intersectObjects(gallery.children, true);
      let clickedIdx = -1;
      if (intersects.length > 0) {
        let obj = intersects[0].object;
        while (obj && obj.parent && obj.userData.index === undefined) obj = obj.parent;
        if (obj && obj.userData.activeIndex !== undefined) clickedIdx = obj.userData.activeIndex;
      }

      if (clickedIdx !== -1) {
        navigateTo(clickedIdx);
        openPanel(clickedIdx);
      } else {
        openPanel();
      }
      return;
    }
    // Snap
    const idx = getIdxFromRot(targetRot);
    navigateTo(idx);
  });

  // Touch
  let touchClickX = 0, touchClickY = 0;
  canvas.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    dragging = true; 
    startX = e.touches[0].clientX;
    touchClickX = e.touches[0].clientX;
    touchClickY = e.touches[0].clientY;
    startRot = targetRot; totalDelta = 0;
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    if (!dragging || e.touches.length !== 1) return;
    const dx = e.touches[0].clientX - startX;
    totalDelta = Math.abs(dx);
    targetRot  = startRot + dx * .0072;
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener('touchend', e => {
    if (!dragging) return; dragging = false;
    if (totalDelta < 6) {
      const clickNorm = new THREE.Vector2(
        (touchClickX / window.innerWidth) * 2 - 1,
        -(touchClickY / window.innerHeight) * 2 + 1
      );
      raycaster.setFromCamera(clickNorm, camera);
      const intersects = raycaster.intersectObjects(gallery.children, true);
      let clickedIdx = -1;
      if (intersects.length > 0) {
        let obj = intersects[0].object;
        while (obj && obj.parent && obj.userData.index === undefined) obj = obj.parent;
        if (obj && obj.userData.activeIndex !== undefined) clickedIdx = obj.userData.activeIndex;
      }
      if (clickedIdx !== -1) {
        navigateTo(clickedIdx);
        openPanel(clickedIdx);
      } else {
        openPanel();
      }
      return; 
    }
    navigateTo(getIdxFromRot(targetRot));
  });

  /* ════════════════════════════════════════════════
     SCROLL — navigate between pieces
  ════════════════════════════════════════════════ */
  let wheelTimer;
  window.addEventListener('wheel', e => {
    e.preventDefault();
    clearTimeout(wheelTimer);
    targetRot += e.deltaY * .0025;
    wheelTimer = setTimeout(() => {
      navigateTo(getIdxFromRot(targetRot));
    }, 180);
  }, { passive: false });

  /* ════════════════════════════════════════════════
     KEYBOARD
  ════════════════════════════════════════════════ */
  window.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
      navigateTo(((activeIdx - 1) + N) % N);
    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
      navigateTo((activeIdx + 1) % N);
    } else if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault(); openPanel();
    } else if (e.key === 'Escape') {
      closePanel();
    }
  });

  /* ════════════════════════════════════════════════
     DETAIL PANEL
  ════════════════════════════════════════════════ */
  function openPanel(idx = activeIdx) {
    if (frames.length === 0) return;
    const p = PIECES_ACTIVE[idx];
    document.getElementById('dp-ghost').textContent = p.num;
    document.getElementById('dp-name').textContent  = p.name;
    document.getElementById('dp-desc').textContent  = p.desc;
    document.getElementById('dp-year').textContent  = p.year;
    document.getElementById('dp-cat').textContent   = p.cat;
    document.getElementById('dp-disc').textContent  = p.disc;
    document.getElementById('detail-panel').classList.add('open');

    // Show large image
    const lv = document.getElementById('large-view');
    document.getElementById('lv-img').src = p.img;
    lv.classList.add('open');
  }

  function closePanel() {
    document.getElementById('detail-panel').classList.remove('open');
    document.getElementById('large-view').classList.remove('open');
  }

  document.getElementById('dp-close').addEventListener('click', closePanel);
  document.getElementById('dp-close').addEventListener('mouseenter', () => document.body.classList.add('cur-active'));
  document.getElementById('dp-close').addEventListener('mouseleave', () => document.body.classList.remove('cur-active'));

  document.getElementById('large-view').addEventListener('click', e => {
    if (e.target.id === 'large-view') {
      closePanel();
    }
  });

  /* ════════════════════════════════════════════════
     ZOOM FUNCTIONALITY
  ════════════════════════════════════════════════ */
  const zoomModal = document.getElementById('zoom-modal');
  const zoomImg = document.getElementById('zoom-img');
  const lvImg = document.getElementById('lv-img');
  const zoomIn = document.getElementById('zoom-in');
  const zoomOut = document.getElementById('zoom-out');
  const zoomClose = document.getElementById('zoom-close');
  const zoomPercent = document.getElementById('zoom-percent');
  const zoomContainer = document.getElementById('zoom-container');

  let currentZoom = 100;
  let isDragging = false;
  let dragStart = { x: 0, y: 0 };
  let imgPos = { x: 0, y: 0 };
  const minZoom = 100;
  const maxZoom = 400;
  const zoomStep = 25;

  function updateZoomDisplay() {
    zoomPercent.textContent = Math.round(currentZoom);
    zoomImg.style.transform = `scale(${currentZoom / 100}) translate(${imgPos.x}px, ${imgPos.y}px)`;
  }

  function openZoom(imgSrc) {
    zoomModal.classList.add('active');
    zoomImg.src = imgSrc;
    currentZoom = 100;
    imgPos = { x: 0, y: 0 };
    updateZoomDisplay();
  }

  function closeZoom() {
    zoomModal.classList.remove('active');
    document.body.classList.remove('cur-drag');
  }

  // Click en imagen para zoom
  lvImg.addEventListener('click', (e) => {
    e.stopPropagation();
    openZoom(lvImg.src);
  });

  // Click en botón cerrar
  zoomClose.addEventListener('click', closeZoom);

  // Click fuera de la imagen (en cualquier parte del modal)
  zoomModal.addEventListener('click', (e) => {
    // Cierra si hace click en el modal mismo o en el contenedor (fuera de la imagen)
    if (e.target === zoomModal || e.target === zoomContainer) {
      closeZoom();
    }
  });

  // También cerrar si hace click en la hint de instrucciones
  document.querySelector('.zoom-hint')?.addEventListener('click', closeZoom);

  // Botones de zoom
  zoomIn.addEventListener('click', () => {
    currentZoom = Math.min(currentZoom + zoomStep, maxZoom);
    updateZoomDisplay();
  });

  zoomOut.addEventListener('click', () => {
    if (currentZoom > minZoom) {
      currentZoom = Math.max(currentZoom - zoomStep, minZoom);
      imgPos = { x: 0, y: 0 }; // Reset position cuando vuelves a 100%
      updateZoomDisplay();
    }
  });

  // Scroll/rueda para zoom
  zoomContainer.addEventListener('wheel', (e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? -zoomStep : zoomStep;
    currentZoom = Math.max(minZoom, Math.min(currentZoom + delta, maxZoom));
    if (currentZoom === minZoom) imgPos = { x: 0, y: 0 };
    updateZoomDisplay();
  }, { passive: false });

  // Arrastrar para mover (cuando está ampliado)
  zoomImg.addEventListener('pointerdown', (e) => {
    if (currentZoom > minZoom) {
      isDragging = true;
      dragStart = { x: e.clientX, y: e.clientY };
      zoomImg.classList.add('dragging');
      document.body.classList.add('cur-drag');
    }
  });

  document.addEventListener('pointermove', (e) => {
    if (!isDragging || currentZoom === minZoom) return;
    const dx = e.clientX - dragStart.x;
    const dy = e.clientY - dragStart.y;
    imgPos.x += dx * 0.5;
    imgPos.y += dy * 0.5;
    dragStart = { x: e.clientX, y: e.clientY };
    updateZoomDisplay();
  });

  document.addEventListener('pointerup', () => {
    isDragging = false;
    zoomImg.classList.remove('dragging');
    document.body.classList.remove('cur-drag');
  });

  // Touch pinch zoom en móvil
  let touchDistance = 0;
  zoomContainer.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      touchDistance = Math.sqrt(dx * dx + dy * dy);
    }
  }, { passive: true });

  zoomContainer.addEventListener('touchmove', (e) => {
    if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const newDistance = Math.sqrt(dx * dx + dy * dy);
      const delta = newDistance - touchDistance;
      if (Math.abs(delta) > 5) {
        currentZoom = Math.max(minZoom, Math.min(currentZoom + (delta > 0 ? zoomStep : -zoomStep), maxZoom));
        if (currentZoom === minZoom) imgPos = { x: 0, y: 0 };
        updateZoomDisplay();
        touchDistance = newDistance;
      }
    }
  }, { passive: true });

  // Tecla Escape para cerrar zoom
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && zoomModal.classList.contains('active')) {
      closeZoom();
    }
  });

  /* ════════════════════════════════════════════════
     DRAG HINT AUTO-HIDE
  ════════════════════════════════════════════════ */
  let hintGone = false;
  function hideHint() {
    if (!hintGone) { hintGone = true; document.getElementById('drag-hint').classList.add('gone'); }
  }
  window.addEventListener('pointermove', hideHint, { once: true });
  window.addEventListener('touchstart',  hideHint, { once: true });

  /* ════════════════════════════════════════════════
     CUSTOM CURSOR
  ════════════════════════════════════════════════ */
  const curDot  = document.getElementById('cur-dot');
  const curRing = document.getElementById('cur-ring');
  let cmx = -100, cmy = -100, cdx = -100, cdy = -100;
  
  // Normalized mouse coords for flashlight & raycasting
  const mouseNorm = new THREE.Vector2(-100, -100);
  let mouseActive = false;
  const raycaster = new THREE.Raycaster();

  document.addEventListener('mousemove', e => {
    cmx = e.clientX; cmy = e.clientY;
    curDot.style.left = cmx + 'px';
    curDot.style.top  = cmy + 'px';
    
    mouseNorm.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouseNorm.y = -(e.clientY / window.innerHeight) * 2 + 1;
    mouseActive = true;
  });
  
  document.addEventListener('mouseleave', () => {
    mouseActive = false;
  });

  (function curLoop() {
    cdx += (cmx - cdx) * 0.12;
    cdy += (cmy - cdy) * 0.12;
    curRing.style.left = cdx + 'px';
    curRing.style.top  = cdy + 'px';
    requestAnimationFrame(curLoop);
  })();

  document.querySelectorAll('a, button').forEach(el => {
    el.addEventListener('mouseenter', () => document.body.classList.add('cur-active'));
    el.addEventListener('mouseleave', () => document.body.classList.remove('cur-active'));
  });

  /* ════════════════════════════════════════════════
     RESIZE
  ════════════════════════════════════════════════ */
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  /* ════════════════════════════════════════════════
     RENDER LOOP
  ════════════════════════════════════════════════ */
  const camWP = new THREE.Vector3();
  let   tick  = 0;

  function animate() {
    requestAnimationFrame(animate);
    tick += .008;

    /* — Smooth gallery rotation — */
    currentRot += (targetRot - currentRot) * .065;
    gallery.rotation.y = currentRot;

    /* — Active piece tracking — */
    const newIdx = getIdxFromRot(currentRot);
    if (newIdx !== prevActive) {
      prevActive = newIdx;
      updateActive(newIdx);
    }

    /* — Billboard: every frame faces the camera — */
    camera.getWorldPosition(camWP);
    frames.forEach(f => f.lookAt(camWP));

    /* — Raycasting for hover (linterna effect) — */
    raycaster.setFromCamera(mouseNorm, camera);
    const intersects = raycaster.intersectObjects(gallery.children, true);
    hoveredIdx = -1; // Reset global
    if (mouseActive && intersects.length > 0) {
      let obj = intersects[0].object;
      while (obj && obj.parent && obj.userData.index === undefined) {
        obj = obj.parent;
      }
      if (obj && obj.userData.index !== undefined) {
        hoveredIdx = obj.userData.index;
      }
    }

    /* — Active piece subtle scale pulse & Hover opacity — */
    frames.forEach(f => {
      const isAct   = f.userData.index === activeIdx;
      const isHov   = f.userData.index === hoveredIdx;
      const tgt     = isAct ? 1.045 : 1.0;
      f.scale.x     += (tgt - f.scale.x) * .055;
      f.scale.y     += (tgt - f.scale.y) * .055;
      f.scale.z     += (tgt - f.scale.z) * .055;

      if (f.userData.imgMat) {
        const tgtOpac = isHov ? 1.0 : 0.3;
        f.userData.imgMat.opacity += (tgtOpac - f.userData.imgMat.opacity) * 0.1;
      }
    });

    /* — Flashlight effect — */
    const isPanelOpen = document.getElementById('detail-panel').classList.contains('open');
    if (mouseActive && !isPanelOpen && !dragging) {
      flashLight.intensity += (20.0 - flashLight.intensity) * 0.08;
      flashTarget.position.x += (mouseNorm.x * 6 - flashTarget.position.x) * 0.1;
      flashTarget.position.y += (mouseNorm.y * 4 - flashTarget.position.y) * 0.1;
    } else {
      flashLight.intensity += (0 - flashLight.intensity) * 0.08;
    }

    /* — Particle drift — */
    if (window._particles) {
      const { pts, pos, speeds, count } = window._particles;
      const pa = pts.geometry.attributes.position;
      for (let i = 0; i < count; i++) {
        pa.array[i * 3 + 1] += speeds[i];
        if (pa.array[i * 3 + 1] > 2.2) pa.array[i * 3 + 1] = -2.2;
      }
      pa.needsUpdate = true;
    }

    /* — Subtle top-light breathe — */
    topLight.intensity = .9 + Math.sin(tick * .7) * .08;

    /* — Warm/cool lights slow orbit — */
    const la = tick * .18;
    warmLight.position.x = Math.sin(la)       * RADIUS * .6;
    warmLight.position.z = Math.cos(la)       * RADIUS * .6;
    coolLight.position.x = Math.sin(la + Math.PI) * RADIUS * .6;
    coolLight.position.z = Math.cos(la + Math.PI) * RADIUS * .6;

    renderer.render(scene, camera);
  }

  animate();

  /* ════════════════════════════════════════════════
     COLLAGE MODE
  ════════════════════════════════════════════════ */
  let viewMode = '3d';

  // Which cards get special sizing (index → class)
  const SPAN_CONFIG = { 0: 'span-tall', 2: 'span-wide', 5: 'span-tall', 7: 'span-wide' };

  function buildCollageCards() {
    const grid = document.getElementById('collage-grid');
    grid.innerHTML = '';
    PIECES.forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'collage-card';
      card.dataset.index = i;
      card.dataset.cat   = p.cat  || '';
      card.dataset.disc  = p.disc || '';
      card.dataset.year  = p.year || '';
      if (SPAN_CONFIG[i]) card.classList.add(SPAN_CONFIG[i]);

      card.innerHTML = `
        <img src="${p.img}" alt="${p.name}" loading="lazy">
        <div class="collage-card-info">
          <div class="collage-card-name">${p.name}</div>
          <div class="collage-card-cat">${p.cat}</div>
        </div>
        <div class="collage-card-num">${p.num}</div>
      `;

      card.addEventListener('click', () => openPanel(i));
      card.addEventListener('mouseenter', () => document.body.classList.add('cur-active'));
      card.addEventListener('mouseleave', () => document.body.classList.remove('cur-active'));
      grid.appendChild(card);
    });
  }

  function updateCollageFilter(filterVal) {
    document.querySelectorAll('.collage-card').forEach(card => {
      if (filterVal === 'all') { card.classList.remove('col-hidden'); return; }
      const year  = card.dataset.year || '';
      const cat   = card.dataset.cat  || '';
      const disc  = card.dataset.disc || '';
      const match = year === filterVal || cat.includes(filterVal) || disc.includes(filterVal);
      card.classList.toggle('col-hidden', !match);
    });
  }

  function toggleView() {
    const btn    = document.getElementById('view-toggle');
    const cview  = document.getElementById('collage-view');
    const cvs    = document.getElementById('three-canvas');
    const hints  = [document.getElementById('drag-hint'), document.getElementById('click-hint'),
                    document.getElementById('gal-index'), document.getElementById('key-hint')];

    if (viewMode === '3d') {
      viewMode = 'collage';
      cview.classList.add('active');
      cvs.style.opacity = '0';
      cvs.style.pointerEvents = 'none';
      hints.forEach(h => h && (h.style.opacity = '0'));
      btn.textContent = '← Vista 3D';
      closePanel();
    } else {
      viewMode = '3d';
      cview.classList.remove('active');
      cvs.style.opacity = '1';
      cvs.style.pointerEvents = '';
      hints.forEach(h => h && (h.style.opacity = ''));
      btn.textContent = 'Collage ↗';
      closePanel();
    }
  }

  // Build collage on load
  buildCollageCards();

  // Wire toggle button
  const vt = document.getElementById('view-toggle');
  vt.addEventListener('click', toggleView);
  vt.addEventListener('mouseenter', () => document.body.classList.add('cur-active'));
  vt.addEventListener('mouseleave', () => document.body.classList.remove('cur-active'));

  // Hook existing filter pills into collage mode as well
  document.querySelectorAll('.filter-pill').forEach(btn => {
    btn.addEventListener('click', e => updateCollageFilter(e.target.dataset.filter));
  });
  </script>
</body>
</html>
