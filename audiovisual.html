<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>JPCC | Audiovisual — El Vacío Monolítico</title>
  <meta name="description" content="Zona audiovisual inmersiva de Juan Pablo Castro.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #030303;
      --ink: #ffffff;
      --ease: cubic-bezier(0.25, 1, 0.5, 1);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background-color: var(--bg);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      cursor: crosshair;
    }

    /* ── Custom Cursor ── */
    #cursor {
      position: fixed; z-index: 9999; pointer-events: none;
      width: 24px; height: 24px;
      transform: translate(-50%, -50%);
      transition: transform 0.08s, opacity 0.3s;
    }
    #cursor svg { width: 100%; height: 100%; transition: all 0.2s; }
    #cursor.hover svg { transform: scale(1.6); }
    #cursor.drag svg { transform: scale(0.7) rotate(45deg); }

    #three-canvas {
      position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
      display: block;
    }

    /* ── Nav ── */
    .gal-nav {
      position: fixed;
      top: 24px;
      left: 52px;
      right: 52px;
      z-index: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 32px;
      background: rgba(8, 8, 8, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-bottom-color: rgba(0, 0, 0, 0.35);
      border-radius: 40px;
      backdrop-filter: blur(40px) saturate(220%) brightness(1.06);
      -webkit-backdrop-filter: blur(40px) saturate(220%) brightness(1.06);
      box-shadow:
        inset 0 1.5px 0 rgba(255, 255, 255, 0.30),
        inset 0 -1px 0 rgba(0, 0, 0, 0.40),
        inset 1px 0 0 rgba(255, 255, 255, 0.10),
        inset -1px 0 0 rgba(255, 255, 255, 0.08),
        0 16px 56px rgba(0, 0, 0, 0.50),
        0 4px 12px rgba(0, 0, 0, 0.30);
      transition: all 0.4s var(--ease);
      overflow: hidden;
      box-sizing: border-box;
    }
    .gal-nav::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(
        135deg,
        rgba(255,255,255,0.22) 0%,
        rgba(255,255,255,0.04) 40%,
        rgba(255,255,255,0.00) 65%,
        rgba(255,255,255,0.04) 100%
      );
      border-radius: 40px;
      pointer-events: none;
      z-index: 0;
    }
    .gal-nav a {
      color: rgba(237, 236, 234, 0.75); text-decoration: none; font-size: 11px;
      font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase;
      pointer-events: auto; transition: color 0.3s;
      position: relative;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .gal-nav a:hover {
      color: rgba(237, 236, 234, 1);
    }

    .nav-music {
      background: linear-gradient(90deg, #00f2fe, #4facfe, #00f2fe);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      mix-blend-mode: normal !important;
      animation: cyanGlow 3s ease infinite;
      font-weight: 700 !important;
    }

    @keyframes cyanGlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ── Loading screen ── */
    #loading {
      position: fixed; inset: 0; background: #030303; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 1.2s var(--ease);
    }
    #loading.fade { opacity: 0; pointer-events: none; }
    .ld-logo {
      font-size: 11px; letter-spacing: 0.35em; margin-bottom: 48px;
      text-transform: uppercase; font-weight: 400; color: rgba(255,255,255,0.5);
    }
    .ld-title {
      font-size: clamp(28px, 5vw, 52px); font-weight: 700; letter-spacing: -0.02em;
      margin-bottom: 48px; line-height: 1;
    }
    .ld-btn {
      padding: 14px 36px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.30);
      border-bottom-color: rgba(0,0,0,0.30);
      color: rgba(255,255,255,0.92);
      font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase;
      cursor: none; font-family: 'Inter', sans-serif;
      border-radius: 12px;
      backdrop-filter: blur(40px) saturate(220%) brightness(1.08);
      -webkit-backdrop-filter: blur(40px) saturate(220%) brightness(1.08);
      box-shadow:
        inset 0 1.5px 0 rgba(255,255,255,0.42),
        inset 0 -1px 0 rgba(0,0,0,0.30),
        inset 1px 0 0 rgba(255,255,255,0.14),
        inset -1px 0 0 rgba(255,255,255,0.10),
        0 12px 48px rgba(0,0,0,0.50),
        0 3px 10px rgba(0,0,0,0.28);
      transition: all 0.35s cubic-bezier(0.16,1,0.3,1);
      position: relative; overflow: hidden;
    }
    .ld-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(
        135deg,
        rgba(255,255,255,0.28) 0%,
        rgba(255,255,255,0.04) 45%,
        transparent 70%
      );
      pointer-events: none;
      border-radius: inherit;
    }
    .ld-btn:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.50);
      color: white;
      box-shadow:
        inset 0 1.5px 0 rgba(255,255,255,0.60),
        inset 0 -1px 0 rgba(0,0,0,0.18),
        0 18px 64px rgba(0,0,0,0.55),
        0 6px 20px rgba(0,0,0,0.32);
      transform: translateY(-3px);
    }

    /* ── UI Layer (title when focused) ── */
    #ui-layer {
      position: fixed; bottom: 44px; left: 50%; transform: translateX(-50%) translateY(15px);
      z-index: 500; pointer-events: none; text-align: center;
      opacity: 0; transition: opacity 0.6s var(--ease), transform 0.6s var(--ease);
      white-space: nowrap;
      background: rgba(8, 8, 8, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-bottom-color: rgba(0, 0, 0, 0.40);
      padding: 24px 44px;
      border-radius: 16px;
      backdrop-filter: blur(44px) saturate(220%) brightness(1.06);
      -webkit-backdrop-filter: blur(44px) saturate(220%) brightness(1.06);
      box-shadow:
        inset 0 1.5px 0 rgba(255, 255, 255, 0.32),
        inset 0 -1px 0 rgba(0, 0, 0, 0.40),
        inset 1px 0 0 rgba(255,255,255,0.10),
        inset -1px 0 0 rgba(255,255,255,0.08),
        0 20px 64px rgba(0, 0, 0, 0.60),
        0 4px 14px rgba(0, 0, 0, 0.35);
      overflow: hidden;
    }
    #ui-layer::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(
        135deg,
        rgba(255,255,255,0.18) 0%,
        rgba(255,255,255,0.03) 45%,
        transparent 70%
      );
      border-radius: inherit;
      pointer-events: none;
    }
    #ui-layer.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .ui-title {
      font-size: 13px; letter-spacing: 0.25em; text-transform: uppercase;
      font-weight: 600; margin-bottom: 6px;
    }
    .ui-desc {
      font-size: 10px; color: rgba(255,255,255,0.45);
      line-height: 1.5; letter-spacing: 0.08em;
    }
    .ui-close-hint {
      margin-top: 10px; font-size: 9px; letter-spacing: 0.12em;
      text-transform: uppercase; color: rgba(255,255,255,0.2);
    }

    /* ── Buttons ── */
    #back-btn { display: none; }

    #hint {
      position: fixed; bottom: 44px; right: 40px; font-size: 9.5px; letter-spacing: 0.12em;
      text-transform: uppercase; color: rgba(255,255,255,0.90); z-index: 500;
      transition: opacity 0.4s;
      background: rgba(8, 8, 8, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-bottom-color: rgba(0,0,0,0.35);
      padding: 8px 18px;
      border-radius: 20px;
      backdrop-filter: blur(36px) saturate(200%) brightness(1.05);
      -webkit-backdrop-filter: blur(36px) saturate(200%) brightness(1.05);
      box-shadow:
        inset 0 1.5px 0 rgba(255, 255, 255, 0.28),
        inset 0 -1px 0 rgba(0, 0, 0, 0.30),
        0 8px 28px rgba(0, 0, 0, 0.35);
      pointer-events: none;
      overflow: hidden;
    }

    #mute-btn {
      position: fixed; bottom: 32px; left: 32px; z-index: 600;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.28);
      border-bottom-color: rgba(0,0,0,0.30);
      color: white;
      width: 48px; height: 48px; border-radius: 50%; cursor: none;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      backdrop-filter: blur(36px) saturate(200%) brightness(1.08);
      -webkit-backdrop-filter: blur(36px) saturate(200%) brightness(1.08);
      box-shadow:
        inset 0 1.5px 0 rgba(255,255,255,0.42),
        inset 0 -1px 0 rgba(0,0,0,0.28),
        0 10px 36px rgba(0,0,0,0.45),
        0 3px 8px rgba(0,0,0,0.25);
      transition: all 0.35s cubic-bezier(0.16,1,0.3,1);
      opacity: 0;
      overflow: hidden;
    }
    #mute-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(
        ellipse at 35% 30%,
        rgba(255,255,255,0.35) 0%,
        rgba(255,255,255,0.05) 55%,
        transparent 80%
      );
      border-radius: 50%;
      pointer-events: none;
    }
    #mute-btn.show { opacity: 1; }
    #mute-btn:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.48);
      box-shadow:
        inset 0 1.5px 0 rgba(255,255,255,0.60),
        inset 0 -1px 0 rgba(0,0,0,0.15),
        0 16px 52px rgba(0,0,0,0.52),
        0 5px 14px rgba(0,0,0,0.30);
      transform: scale(1.08);
    }
    #mute-btn.muted {
      border-color: rgba(255,255,255,0.20);
      box-shadow:
        inset 0 1.5px 0 rgba(255,255,255,0.28),
        inset 0 -1px 0 rgba(0,0,0,0.24),
        0 8px 28px rgba(0,0,0,0.40),
        0 2px 6px rgba(0,0,0,0.22);
    }
    #mute-btn svg {
      width: 18px; height: 18px;
      stroke: white;
      fill: none;
      transition: transform 0.2s;
    }
    #mute-btn .svg-off { display: none; }
    #mute-btn.muted .svg-on { display: none; }
    #mute-btn.muted .svg-off { display: block; }

    @media (max-width: 768px) {
      .gal-nav {
        top: 16px;
        left: 12px;
        right: 12px;
        padding: 11px 16px;
        gap: 8px;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .gal-nav::-webkit-scrollbar { display: none; }
      .gal-nav a { font-size: 10px; letter-spacing: 0.14em; }
      #ui-layer {
        width: calc(100% - 32px);
        white-space: normal;
        padding: 16px 20px;
        bottom: 24px;
      }
      .ld-btn {
        padding: 14px 44px;
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <!-- Custom cursor -->
  <div id="cursor">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="12" y1="2" x2="12" y2="8" stroke="white" stroke-width="1.2"/>
      <line x1="12" y1="16" x2="12" y2="22" stroke="white" stroke-width="1.2"/>
      <line x1="2" y1="12" x2="8" y2="12" stroke="white" stroke-width="1.2"/>
      <line x1="16" y1="12" x2="22" y2="12" stroke="white" stroke-width="1.2"/>
      <circle cx="12" cy="12" r="2.5" stroke="white" stroke-width="1.2"/>
    </svg>
  </div>



  <div id="loading">
    <div class="ld-logo">Juan Pablo Castro</div>
    <div class="ld-title">El Vacío Monolítico</div>
    <button class="ld-btn" id="enter-btn">Ingresar al Espacio</button>
  </div>

  <nav class="gal-nav">
    <a href="index.html">← Portafolio</a>
    <a href="galeria.html">Galería 3D</a>
    <a href="musical.html" class="nav-music">Música 3D</a>
  </nav>

  <canvas id="three-canvas"></canvas>

  <div id="ui-layer">
    <div class="ui-title" id="ui-title"></div>
    <div class="ui-desc" id="ui-desc"></div>
    <div class="ui-close-hint">Clic afuera para cerrar</div>
  </div>

  <button id="back-btn">Volver al Vacío</button>
  <button id="mute-btn" title="Silenciar / Activar sonido">
    <svg class="mute-svg svg-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
    <svg class="mute-svg svg-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"></path><line x1="22" y1="9" x2="16" y2="15"></line><line x1="16" y1="9" x2="22" y2="15"></line></svg>
  </button>
  <div id="hint">Arrastra para explorar</div>

  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="https://unpkg.com/@tweenjs/tween.js@18.6.4/dist/tween.umd.js"></script>

  <script>
    /* ──────────────── VIDEOS ──────────────── */
    const VIDEOS = [
      { id: 'vid1', src: 'video/manzano.mp4',  title: 'Manzano',                  desc: '2026 · After Effects' },
      { id: 'vid2', src: 'video/ascii.mp4',    title: 'Experimentación en ASCII', desc: '2026 · After Effects' },
      { id: 'vid3', src: 'video/videoyt.mp4',  title: 'YouTube',                  desc: 'Motion Graphics' },
      { id: 'vid4', src: 'video/expe.mp4',     title: 'Experimento',              desc: 'Proyecto Audiovisual' }
    ];

    /* ──────────────── GLOBALS ──────────────── */
    let scene, camera, renderer;
    let monoliths = [], glowLights = [];
    let audioListener;
    let contextResumed = false;

    // Color extraction (ambilight)
    const colorCanvas = document.createElement('canvas');
    colorCanvas.width = 4; colorCanvas.height = 4;
    const colorCtx = colorCanvas.getContext('2d', { willReadFrequently: true });
    const baseColor   = new THREE.Color(0x030303);
    const targetColor = new THREE.Color(0x030303);

    // Interaction
    let isDragging = false;
    let previousMousePosition = { x: 0, y: 0 };
    let clickStartPosition    = { x: 0, y: 0 };
    let targetRotation  = { x: 0, y: 0 };
    let currentRotation = { x: 0, y: 0 };
    let activeMonolith  = null;
    let isMuted = false;

    // Mouse parallax
    let mouseNorm = { x: 0, y: 0 }; // -1..1

    // Auto-rotate when idle
    let lastInteractionTime = 0;
    const IDLE_DELAY = 4000; // ms before auto-rotate kicks in
    let autoRotating = false;

    // Hover detection
    let hoveredMonolith = null;

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const clock  = new THREE.Clock();

    /* DOM */
    const canvasEl      = document.getElementById('three-canvas');
    const uiLayer       = document.getElementById('ui-layer');
    const uiTitle       = document.getElementById('ui-title');
    const uiDesc        = document.getElementById('ui-desc');
    const backBtn       = document.getElementById('back-btn');
    const muteBtn       = document.getElementById('mute-btn');
    const focusOverlay  = document.getElementById('focus-overlay');
    const cursorEl      = document.getElementById('cursor');
    const hintEl        = document.getElementById('hint');

    /* ──────────────── CUSTOM CURSOR ──────────────── */
    window.addEventListener('mousemove', e => {
      cursorEl.style.left = e.clientX + 'px';
      cursorEl.style.top  = e.clientY + 'px';
      mouseNorm.x = (e.clientX / window.innerWidth)  * 2 - 1;
      mouseNorm.y = (e.clientY / window.innerHeight) * 2 - 1;
    });

    /* ──────────────── MUTE ──────────────── */
    muteBtn.addEventListener('click', () => {
      isMuted = !isMuted;
      monoliths.forEach(m => { m.userData.video.muted = isMuted; });
      muteBtn.classList.toggle('muted', isMuted);
    });

    /* ──────────────── ENTER ──────────────── */
    document.getElementById('enter-btn').addEventListener('click', init);

    function init() {
      if (contextResumed) return;
      contextResumed = true;

      document.getElementById('loading').classList.add('fade');
      setTimeout(() => document.getElementById('loading').style.display = 'none', 1200);
      muteBtn.classList.add('show');

      /* Scene */
      scene = new THREE.Scene();
      // No fog — videos render at full brightness

      /* Camera starts FAR for tunnel effect */
      camera = new THREE.PerspectiveCamera(90, window.innerWidth / window.innerHeight, 0.1, 200);
      camera.position.set(0, 0, 80);

      /* Renderer */
      renderer = new THREE.WebGLRenderer({ canvas: canvasEl, antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

      /* Audio */
      audioListener = new THREE.AudioListener();
      camera.add(audioListener);

      /* Ambient */
      scene.add(new THREE.AmbientLight(0xffffff, 0.08));

      /* ──── Build monoliths ──── */
      const radius    = 6.5;
      const angleStep = (Math.PI * 2) / VIDEOS.length;

      VIDEOS.forEach((v, i) => {
        const video = document.createElement('video');
        video.src        = v.src;
        video.crossOrigin = 'anonymous';
        video.loop       = true;
        video.playsInline = true;
        video.muted      = true;
        video.play().then(() => { video.muted = false; }).catch(() => {});

        const texture = new THREE.VideoTexture(video);
        texture.colorSpace = THREE.SRGBColorSpace;

        const w = 4.2, h = w / (16/9);
        const geo  = new THREE.PlaneGeometry(w, h);
        const mat  = new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide });
        const mesh = new THREE.Mesh(geo, mat);

        const angle = i * angleStep;
        mesh.position.set(Math.sin(angle) * radius, (Math.random() - 0.5) * 1.5, -Math.cos(angle) * radius);
        mesh.lookAt(0, mesh.position.y, 0);

        /* Dynamic aspect ratio */
        video.addEventListener('loadedmetadata', () => {
          const aspect = video.videoWidth / video.videoHeight || 16/9;
          let rW, rH;
          if (aspect >= 1) { rW = 4.2; rH = rW / aspect; }
          else             { rH = 4.2; rW = rH * aspect; }
          mesh.geometry.dispose();
          mesh.geometry = new THREE.PlaneGeometry(rW, rH);
        });

        /* Spatial audio */
        const sound = new THREE.PositionalAudio(audioListener);
        const src   = audioListener.context.createMediaElementSource(video);
        sound.setNodeSource(src);
        sound.setRefDistance(2.5);
        sound.setVolume(1.0);
        sound.setDistanceModel('exponential');
        sound.setRolloffFactor(2.5);
        mesh.add(sound);

        /* Screen glow light */
        const glow = new THREE.PointLight(0xffffff, 0, 5);
        glow.position.copy(mesh.position);
        glow.position.z += 0.6 * Math.cos(angle);
        glow.position.x -= 0.6 * Math.sin(angle);
        scene.add(glow);
        glowLights.push(glow);

        mesh.userData = { video, sound, data: v, basePos: mesh.position.clone(), angle, glow };
        scene.add(mesh);
        monoliths.push(mesh);
      });

      /* ──── Particles ──── */
      const pCount = 2400;
      const pGeo   = new THREE.BufferGeometry();
      const pPos   = new Float32Array(pCount * 3);
      for (let i = 0; i < pCount; i++) {
        pPos[i*3]   = (Math.random() - 0.5) * 32;
        pPos[i*3+1] = (Math.random() - 0.5) * 32;
        pPos[i*3+2] = (Math.random() - 0.5) * 130;
      }
      pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
      const pMat = new THREE.PointsMaterial({ color: 0xdddddd, size: 0.04, transparent: true, opacity: 0.25 });
      window.particles = new THREE.Points(pGeo, pMat);
      scene.add(window.particles);

      /* ──── Events ──── */
      window.addEventListener('resize', onResize);
      canvasEl.addEventListener('pointerdown', onPointerDown);
      window.addEventListener('pointermove', onPointerMove);
      window.addEventListener('pointerup', onPointerUp);

      /* ──── Tunnel entrance: FOV rush from 90→55, position from Z80→0 ──── */
      new TWEEN.Tween(camera.position)
        .to({ x: 0, y: 0, z: 0 }, 4200)
        .easing(TWEEN.Easing.Cubic.Out)
        .start();

      new TWEEN.Tween({ fov: 90 })
        .to({ fov: 55 }, 4200)
        .easing(TWEEN.Easing.Cubic.Out)
        .onUpdate(obj => { camera.fov = obj.fov; camera.updateProjectionMatrix(); })
        .start();

      animate();
    }

    /* ──────────────── POINTER EVENTS ──────────────── */
    function onPointerDown(e) {
      lastInteractionTime = Date.now();
      if (activeMonolith) { clickStartPosition = { x: e.clientX, y: e.clientY }; return; }
      isDragging = true;
      previousMousePosition = clickStartPosition = { x: e.clientX, y: e.clientY };
      cursorEl.classList.add('drag');
    }

    function onPointerMove(e) {
      lastInteractionTime = Date.now();
      if (isDragging && !activeMonolith) {
        const dx = e.clientX - previousMousePosition.x;
        const dy = e.clientY - previousMousePosition.y;
        targetRotation.y -= dx * 0.003;
        targetRotation.x -= dy * 0.003;
        targetRotation.x = Math.max(-Math.PI/3, Math.min(Math.PI/3, targetRotation.x));
        previousMousePosition = { x: e.clientX, y: e.clientY };
      }
      // Hover detection
      if (!activeMonolith && !isDragging) {
        mouse.x = (e.clientX / window.innerWidth)  * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObjects(monoliths);
        const nowHovered = hits.length > 0 ? hits[0].object : null;
        if (nowHovered !== hoveredMonolith) {
          hoveredMonolith = nowHovered;
          cursorEl.classList.toggle('hover', !!hoveredMonolith);
        }
      }
    }

    function onPointerUp(e) {
      isDragging = false;
      cursorEl.classList.remove('drag');
      lastInteractionTime = Date.now();

      const dx = Math.abs(e.clientX - clickStartPosition.x);
      const dy = Math.abs(e.clientY - clickStartPosition.y);
      if (dx > 6 || dy > 6) return; // was a drag, not a click

      mouse.x = (e.clientX / window.innerWidth)  * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(monoliths);

      if (activeMonolith) {
        if (hits.length === 0 || hits[0].object !== activeMonolith) closeMonolith();
      } else {
        if (hits.length > 0) openMonolith(hits[0].object);
      }
    }

    /* ──────────────── OPEN / CLOSE ──────────────── */
    function openMonolith(mesh) {
      activeMonolith = mesh;
      hoveredMonolith = null;
      cursorEl.classList.remove('hover');

      const dist     = 3.0;
      const targetPos = new THREE.Vector3(0, 0, dist);
      targetPos.applyEuler(mesh.rotation);
      targetPos.add(mesh.position);

      new TWEEN.Tween(camera.position)
        .to({ x: targetPos.x, y: targetPos.y, z: targetPos.z }, 1400)
        .easing(TWEEN.Easing.Cubic.InOut).start();

      new TWEEN.Tween(camera.rotation)
        .to({ x: mesh.rotation.x, y: mesh.rotation.y, z: mesh.rotation.z }, 1400)
        .easing(TWEEN.Easing.Cubic.InOut).start();

      // FOV punch-in
      new TWEEN.Tween({ fov: camera.fov })
        .to({ fov: 48 }, 1400)
        .easing(TWEEN.Easing.Cubic.InOut)
        .onUpdate(o => { camera.fov = o.fov; camera.updateProjectionMatrix(); })
        .start();

      monoliths.forEach(m => {
        m.userData.sound.setVolume(m === mesh ? 1.0 : 0.04);
      });

      uiTitle.textContent = mesh.userData.data.title;
      uiDesc.textContent  = mesh.userData.data.desc;
      uiLayer.classList.add('show');
      hintEl.style.opacity = '0';
    }

    function closeMonolith() {
      activeMonolith = null;
      uiLayer.classList.remove('show');
      hintEl.style.opacity = '1';

      monoliths.forEach(m => m.userData.sound.setVolume(1.0));

      new TWEEN.Tween(camera.position)
        .to({ x: 0, y: 0, z: 0 }, 1400)
        .easing(TWEEN.Easing.Cubic.InOut).start();

      new TWEEN.Tween({ fov: camera.fov })
        .to({ fov: 55 }, 1400)
        .easing(TWEEN.Easing.Cubic.InOut)
        .onUpdate(o => { camera.fov = o.fov; camera.updateProjectionMatrix(); })
        .start();
    }

    function onResize() {
      if (!camera) return;
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    /* ──────────────── ANIMATE ──────────────── */
    function animate() {
      requestAnimationFrame(animate);
      TWEEN.update();

      const elapsed  = clock.getElapsedTime();
      const idleFor  = Date.now() - lastInteractionTime;

      /* ── Camera rotation (drag + mouse parallax + auto-rotate) ── */
      if (!activeMonolith) {
        // Auto-rotate when idle
        if (idleFor > IDLE_DELAY) {
          targetRotation.y += 0.0006;
        }
        // Subtle mouse parallax (only when not dragging)
        const parallaxStrength = isDragging ? 0 : 0.12;
        const parallaxX = -mouseNorm.y * parallaxStrength;
        const parallaxY = -mouseNorm.x * parallaxStrength;

        currentRotation.x += (targetRotation.x + parallaxX - currentRotation.x) * 0.08;
        currentRotation.y += (targetRotation.y + parallaxY - currentRotation.y) * 0.08;

        const euler = new THREE.Euler(currentRotation.x, currentRotation.y, 0, 'YXZ');
        camera.quaternion.setFromEuler(euler);
      }

      /* ── Monolith float + hover glow ── */
      monoliths.forEach((m, i) => {
        m.position.y = m.userData.basePos.y + Math.sin(elapsed * 1.2 + i * 1.4) * 0.18;

        // Glow intensity: strong on active, medium on hovered, low otherwise
        const isActive  = m === activeMonolith;
        const isHovered = m === hoveredMonolith;
        const targetIntensity = isActive ? 3.5 : isHovered ? 1.8 : 0.2;
        m.userData.glow.intensity += (targetIntensity - m.userData.glow.intensity) * 0.08;
      });

      /* ── Particles drift ── */
      if (window.particles) {
        window.particles.rotation.y = elapsed * 0.04;
        window.particles.rotation.x = Math.sin(elapsed * 0.05) * 0.04;
      }

      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
